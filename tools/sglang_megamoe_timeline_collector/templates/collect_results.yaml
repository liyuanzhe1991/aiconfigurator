apiVersion: batch/v1
kind: Job
metadata:
  name: aic-sgl-native-results-20260508105435
  namespace: default
  labels:
    app: aic-native-sglang-megamoe-sched-nvtx-20260508105435
    role: results
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: aic-native-sglang-megamoe-sched-nvtx-20260508105435
        role: results
    spec:
      restartPolicy: Never
      nodeSelector:
        node.kubernetes.io/instance-type: n2d-standard-8
      tolerations:
        - key: dedicated
          operator: Equal
          value: user-workload
          effect: NoExecute
      containers:
        - name: list
          image: python:3.12-slim
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euxo pipefail
              root=/models/aic_native_sglang_megamoe_scheduler_nvtx/20260508105435
              echo "RESULT_ROOT=${root}"
              find "${root}" -maxdepth 5 -type f -printf '%p %s bytes\n' | sort
          volumeMounts:
            - name: shared
              mountPath: /models
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: shared-model-cache
