apiVersion: v1
kind: Pod
metadata:
  name: aic-sgl-native-copy-20260508105435
  namespace: default
  labels:
    app: aic-native-sglang-megamoe-copy-20260508105435
    role: pvc-copy
spec:
  restartPolicy: Never
  nodeSelector:
    node.kubernetes.io/instance-type: n2d-standard-8
  tolerations:
    - key: dedicated
      operator: Equal
      value: user-workload
      effect: NoExecute
  containers:
    - name: copy
      image: python:3.12-slim
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -euo pipefail
          while true; do sleep 3600; done
      volumeMounts:
        - name: shared
          mountPath: /models
  volumes:
    - name: shared
      persistentVolumeClaim:
        claimName: shared-model-cache
